name: Deploy Frontend To VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/known_hosts ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null 2>&1; then
            echo "VM_SSH_KEY secret is invalid. Paste the exact contents of ~/.ssh/devtalk_vm_deploy and use a key without a passphrase."
            exit 1
          fi

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'EOF'
          set -euo pipefail
          heartbeat() {
            while true; do
              echo "[deploy] still running $(date '+%Y-%m-%dT%H:%M:%S%z')"
              sleep 30
            done
          }
          heartbeat &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" >/dev/null 2>&1 || true' EXIT

          mkdir -p ~/devtalk
          if [ ! -d ~/devtalk/devtalk-frontend/.git ]; then
            echo "[deploy] cloning frontend repository"
            git clone https://github.com/DevTalkToday/devtalk-Frontend.git ~/devtalk/devtalk-frontend
          fi

          echo "[deploy] updating frontend repository"
          cd ~/devtalk/devtalk-frontend
          git fetch origin main
          git checkout -B main origin/main

          cd ~/devtalk/deploy/gsmsv
          if [[ ! -f .env ]]; then
            echo "Missing deploy/gsmsv/.env"
            exit 1
          fi

          echo "[deploy] rebuilding frontend"
          docker compose up -d --build frontend
          echo "[deploy] ensuring nginx stays up"
          docker compose up -d --no-build nginx

          verified=0
          for attempt in 1 2 3 4 5 6; do
            if docker compose exec -T frontend node -e "fetch('http://127.0.0.1:3000').then((res) => { console.log(res.status); process.exit(res.ok ? 0 : 1); }).catch((error) => { console.error(error); process.exit(1); })" \
              && docker compose exec -T frontend node -e "fetch('http://127.0.0.1:3000/api/profile/1').then((res) => { console.log(res.status); process.exit([200, 401, 404].includes(res.status) ? 0 : 1); }).catch((error) => { console.error(error); process.exit(1); })" \
              && docker compose exec -T nginx wget -qO- http://127.0.0.1/health > /dev/null; then
              verified=1
              break
            fi

            if [ "$attempt" -lt 6 ]; then
              echo "verify attempt $attempt failed, retrying in 5s..."
              sleep 5
            fi
          done

          if [ "$verified" -eq 1 ]; then
            echo "Deployment verification succeeded."
          else
            echo "Deployment verification failed after retries."
            exit 1
          fi

          kill "$heartbeat_pid" >/dev/null 2>&1 || true
          trap - EXIT
          EOF
